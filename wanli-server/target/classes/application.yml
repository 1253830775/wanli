server:
  port: 8080

spring:
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

wanli:
  llm:
    provider: deepseek
    api-key: ${WANLI_LLM_API_KEY:sk-3dcb4b1effac46fcb51d6ea8155b0862}
    model: deepseek-chat
    temperature: 0.8
    max-tokens: 2048
    base-url: https://api.deepseek.com/v1
  game:
    max-history-rounds: 15
    kg-top-k: 50
    narrative-buffer-size: 2000

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/wanli;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/wanli
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
